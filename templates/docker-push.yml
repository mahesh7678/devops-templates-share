parameters:
  imageName: ''
  imageTag: 'latest'
  dockerServiceConnection: ''

steps:

- task: Docker@2
  displayName: Login to Docker Hub
  inputs:
    command: login
    containerRegistry: ${{ parameters.dockerServiceConnection }}

- task: Docker@2
  displayName: Push Docker Image (Tag)
  inputs:
    command: push
    repository: ${{ parameters.imageName }}
    tags: |
      ${{ parameters.imageTag }}

- task: Docker@2
  displayName: Push Docker Image (Latest)
  inputs:
    command: push
    repository: ${{ parameters.imageName }}
    tags: |
      latest
